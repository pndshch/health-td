<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>免疫タワーディフェンス - Immune TD</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #141a30; font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; }
canvas { display: block; touch-action: none; }

#ui-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
}

/* Top HUD */
#top-hud {
    position: absolute; top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none; gap: 6px; flex-wrap: wrap;
}
.hud-item {
    background: rgba(15,20,45,0.88); backdrop-filter: blur(8px);
    border: 1px solid rgba(0,220,160,0.45); border-radius: 10px;
    padding: 7px 12px; color: #d0f0e0; font-size: 13px; font-weight: 600;
}
#hp-bar-wrap {
    width: 140px; height: 8px; background: #1a3020; border-radius: 5px; overflow: hidden; margin-top: 3px;
}
#hp-bar { height: 100%; background: linear-gradient(90deg, #00e060, #90ff30); width: 100%; transition: width 0.3s; border-radius: 5px; }
#hp-bar.low { background: linear-gradient(90deg, #ff2244, #ff7700); }

/* Tower selection panel */
#tower-panel {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; pointer-events: auto;
}
.tower-btn {
    width: 62px; height: 72px; background: rgba(15,20,45,0.92);
    border: 2px solid rgba(0,220,160,0.35); border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: #c0e8d8;
}
.tower-btn:hover, .tower-btn:active { border-color: #00e676; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,230,118,0.3); }
.tower-btn.selected { border-color: #00e676; background: rgba(0,230,118,0.18); }
.tower-btn.disabled { opacity: 0.35; pointer-events: none; }
.tower-icon { font-size: 24px; margin-bottom: 2px; }
.tower-name { font-size: 8px; font-weight: 600; }
.tower-cost { font-size: 9px; color: #ffd54f; }

/* Wave & sell buttons */
#wave-btn {
    position: absolute; bottom: 12px; right: 12px;
    pointer-events: auto; background: linear-gradient(135deg, #00c853, #00e676);
    border: none; border-radius: 10px; padding: 10px 16px;
    color: #0a1a0a; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,200,100,0.4);
}
#wave-btn:hover { transform: scale(1.05); }
#wave-btn:disabled { opacity: 0.5; pointer-events: none; }

#sell-btn {
    position: absolute; bottom: 12px; left: 12px;
    pointer-events: auto; background: linear-gradient(135deg, #c62828, #ef5350);
    border: none; border-radius: 10px; padding: 10px 14px;
    color: #fff; font-size: 12px; font-weight: 700; cursor: pointer;
    display: none; transition: all 0.2s;
}

/* Info tooltip */
#tooltip {
    position: absolute; display: none; pointer-events: none;
    background: rgba(15,20,45,0.95); border: 1px solid rgba(0,220,160,0.5);
    border-radius: 8px; padding: 10px 14px; color: #c0e8d8;
    font-size: 12px; max-width: 220px; z-index: 50;
    line-height: 1.5;
}

/* Start screen */
#start-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #122828 0%, #141430 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #d0f0e0; padding: 20px;
}
#start-screen h1 { font-size: 36px; margin-bottom: 8px; text-shadow: 0 0 20px rgba(0,220,120,0.6); }
#start-screen .sub { font-size: 15px; color: #00e676; margin-bottom: 20px; }
#start-screen .desc { font-size: 12px; color: #8cc0a8; max-width: 420px; text-align: center; line-height: 1.7; margin-bottom: 24px; }
#start-btn {
    background: linear-gradient(135deg, #00c853, #00e676); border: none;
    border-radius: 12px; padding: 14px 36px; font-size: 17px; font-weight: 700;
    color: #0a1a0a; cursor: pointer; transition: transform 0.2s;
}
#start-btn:hover { transform: scale(1.05); }
.hidden { display: none !important; }

/* Game Over */
#game-over {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,5,5,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #d0f0e0; padding: 20px;
}
#game-over h1 { font-size: 40px; margin-bottom: 10px; }
#game-over .stats { font-size: 15px; color: #8cc0a8; margin-bottom: 24px; text-align: center; line-height: 2; }
#retry-btn {
    background: linear-gradient(135deg, #00c853, #00e676); border: none;
    border-radius: 12px; padding: 14px 36px; font-size: 16px; font-weight: 700;
    color: #0a1a0a; cursor: pointer;
}

/* Popup */
#popup {
    position: fixed; top: 28%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(10,15,35,0.95); border: 1px solid #00e676; border-radius: 12px;
    padding: 14px 22px; color: #00e676; font-size: 16px; font-weight: 700;
    z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    text-align: center; max-width: 90vw;
}
#popup.show { opacity: 1; }

/* ── Mobile ── */
@media (max-width: 700px) {
    .tower-btn { width: 48px; height: 56px; }
    .tower-icon { font-size: 20px; }
    .tower-name { font-size: 7px; }
    .tower-cost { font-size: 8px; }
    #tower-panel { gap: 4px; bottom: 8px; }
    #wave-btn { padding: 8px 12px; font-size: 11px; bottom: 8px; right: 6px; }
    #sell-btn { padding: 8px 10px; font-size: 10px; bottom: 8px; left: 6px; }
    .hud-item { padding: 4px 8px; font-size: 10px; border-radius: 8px; }
    #hp-bar-wrap { width: 80px; height: 6px; }
    #top-hud { top: 4px; left: 4px; right: 4px; }
    #start-screen h1 { font-size: 24px; }
    #start-screen .sub { font-size: 13px; }
    #start-screen .desc { font-size: 11px; }
    #popup { font-size: 13px; padding: 10px 16px; }
}
@media (max-width: 400px) {
    .tower-btn { width: 42px; height: 50px; }
    .tower-icon { font-size: 17px; }
    #tower-panel { gap: 3px; }
    .hud-item { padding: 3px 6px; font-size: 9px; }
}
</style>
</head>
<body>

<div id="start-screen">
    <h1>免疫タワーディフェンス</h1>
    <div class="sub">Immune Tower Defense</div>
    <div class="desc">
        ウイルスや悪玉菌が体に侵入してくる！<br>
        免疫細胞やビタミンのタワーを設置して、健康を守ろう！<br><br>
        📱 タワーを選んで緑のマスにタップ<br>
        ⬆️ 設置済みタワーをタップでアップグレード<br>
        ⭐ Lv3・Lv5で特殊能力を獲得！<br>
        🌊 WAVEボタンで敵の波を開始
    </div>
    <button id="start-btn">ゲームスタート</button>
</div>

<div id="game-over" class="hidden">
    <h1 id="result-title">GAME OVER</h1>
    <div class="stats" id="result-stats"></div>
    <button id="retry-btn">もう一度</button>
</div>

<div id="ui-overlay">
    <div id="top-hud">
        <div class="hud-item">
            <div>❤️ <span id="hp-text">20/20</span></div>
            <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
        </div>
        <div class="hud-item">🌊 <span id="wave-text">0/25</span></div>
        <div class="hud-item">💰 <span id="money-text">100</span>P</div>
        <div class="hud-item">🏆 <span id="score-text">0</span></div>
    </div>
    <div id="tower-panel">
        <div class="tower-btn" data-tower="vitaminC">
            <div class="tower-icon">🍊</div>
            <div class="tower-name">ビタミンC</div>
            <div class="tower-cost">30P</div>
        </div>
        <div class="tower-btn" data-tower="whiteCell">
            <div class="tower-icon">🔬</div>
            <div class="tower-name">白血球</div>
            <div class="tower-cost">50P</div>
        </div>
        <div class="tower-btn" data-tower="broccoli">
            <div class="tower-icon">🥦</div>
            <div class="tower-name">ブロッコリー</div>
            <div class="tower-cost">40P</div>
        </div>
        <div class="tower-btn" data-tower="sleep">
            <div class="tower-icon">😴</div>
            <div class="tower-name">睡眠</div>
            <div class="tower-cost">60P</div>
        </div>
        <div class="tower-btn" data-tower="exercise">
            <div class="tower-icon">🏃</div>
            <div class="tower-name">運動</div>
            <div class="tower-cost">45P</div>
        </div>
    </div>
    <button id="wave-btn">🌊 WAVE START</button>
    <button id="sell-btn">🗑️ 売却</button>
    <div id="tooltip"></div>
    <div id="popup"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ══════════════════════════════════════════════
//  BLENDER MODEL LOADING
// ══════════════════════════════════════════════
const blenderModels = {};
let blenderLoaded = false;

function loadBlenderModels() {
  return new Promise((resolve) => {
    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
    loader.setDRACOLoader(dracoLoader);

    loader.load('./scene.glb', (gltf) => {
      gltf.scene.traverse((child) => {
        if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
      });
      gltf.scene.children.forEach(child => { blenderModels[child.name] = child; });
      blenderLoaded = true;
      console.log('Blender models loaded:', Object.keys(blenderModels));
      resolve();
    }, undefined, (err) => {
      console.warn('Blender GLB failed, using procedural:', err);
      resolve();
    });
  });
}

function cloneBlenderModel(name) {
  const src = blenderModels[name];
  if (!src) return null;
  const clone = src.clone(true);
  clone.traverse((child) => {
    if (child.isMesh && child.material) child.material = child.material.clone();
  });
  return clone;
}

const TOWER_MODEL_MAP = {
  vitaminC: 'TowerVitaminC', whiteCell: 'TowerWhiteCell', broccoli: 'TowerBroccoli',
  sleep: 'TowerSleep', exercise: 'TowerExercise',
};
const ENEMY_MODEL_MAP = {
  virus: 'EnemyVirus', bacteria: 'EnemyBacteria', junkFood: 'EnemyJunkFood',
  stress: 'EnemyStress', allergen: 'EnemyAllergen', bossVirus: 'EnemyBossVirus',
};

// ══════════════════════════════════════════════
//  GAME CONFIG
// ══════════════════════════════════════════════
const GRID_SIZE = 16;
const CELL = 3;
const MAX_WAVES = 25;
const MAX_HP = 20;
const IS_MOBILE = window.innerWidth < 700;
const PARTICLE_COUNT = IS_MOBILE ? 3 : 6;

const TOWER_DATA = {
    vitaminC:  { name: 'ビタミンC',     cost: 30, range: 4.5, fireRate: 0.4, damage: 8,  color: 0xffa000, projColor: 0xffcc00, desc: '素早く連射。基本防衛に最適' },
    whiteCell: { name: '白血球',        cost: 50, range: 3.5, fireRate: 1.0, damage: 30, color: 0xe0e0ff, projColor: 0xffffff, desc: '高火力・単体攻撃。ボスに強い' },
    broccoli:  { name: 'ブロッコリー',  cost: 40, range: 3.0, fireRate: 0.8, damage: 12, color: 0x43a047, projColor: 0x81c784, desc: '範囲攻撃で群を殲滅', splash: 2.0 },
    sleep:     { name: '睡眠',          cost: 60, range: 4.0, fireRate: 1.5, damage: 5,  color: 0x9c6dff, projColor: 0xce93d8, desc: '敵を減速させる', slow: 0.4 },
    exercise:  { name: '運動',          cost: 45, range: 5.0, fireRate: 0.6, damage: 10, color: 0x26c6da, projColor: 0x80deea, desc: '長射程・バランス型' },
};

const TOWER_SPECS = {
    vitaminC: {
        3: { name: '高濃度ビタミンC', desc: '弾が2体を貫通', effect: 'pierce' },
        5: { name: 'メガドーズ', desc: '30%で3倍クリティカル', effect: 'crit' },
    },
    whiteCell: {
        3: { name: 'キラーT細胞', desc: 'ボスに+50%ダメ', effect: 'antiBoss' },
        5: { name: 'マクロファージ', desc: '倒した敵から+5P回収', effect: 'devour' },
    },
    broccoli: {
        3: { name: 'スルフォラファン', desc: '毒:3秒間5/s', effect: 'poison' },
        5: { name: 'ファイトケミカル', desc: '範囲+50%,ダメ+30%', effect: 'megaSplash' },
    },
    sleep: {
        3: { name: '深い眠り', desc: '10%で2秒完全停止', effect: 'freeze' },
        5: { name: 'REM睡眠', desc: '周囲タワー攻撃速度+20%', effect: 'aura' },
    },
    exercise: {
        3: { name: 'HIIT', desc: '3連射(0.7倍×3)', effect: 'burst' },
        5: { name: 'マラソン', desc: '射程+40%,遠距離高ダメ', effect: 'sniper' },
    },
};

const ENEMY_TYPES = {
    virus:      { name: 'ウイルス',       hp: 40,  speed: 2.0, reward: 8,  color: 0xef5350, scale: 1.0 },
    bacteria:   { name: '悪玉菌',         hp: 70,  speed: 1.5, reward: 12, color: 0xab47bc, scale: 1.1 },
    junkFood:   { name: 'ジャンクフード', hp: 100, speed: 1.2, reward: 15, color: 0xffa726, scale: 1.2 },
    stress:     { name: 'ストレス',       hp: 60,  speed: 2.5, reward: 10, color: 0x78909c, scale: 1.0 },
    allergen:   { name: 'アレルゲン',     hp: 150, speed: 1.8, reward: 20, color: 0xffee58, scale: 1.2 },
    sleepDebt:  { name: '睡眠負債',       hp: 80,  speed: 2.8, reward: 12, color: 0x7e57c2, scale: 0.9 },
    sugarRush:  { name: '糖分過多',       hp: 120, speed: 2.2, reward: 18, color: 0xffb74d, scale: 1.1 },
    burnout:    { name: '燃え尽き',       hp: 250, speed: 1.3, reward: 30, color: 0x607d8b, scale: 1.4 },
    bossVirus:  { name: '変異ウイルス',   hp: 500, speed: 1.0, reward: 50, color: 0xe53935, scale: 2.0 },
    pandemic:   { name: 'パンデミック',   hp: 800, speed: 0.8, reward: 80, color: 0xc62828, scale: 2.3 },
};

// ══════════════════════════════════════════════
//  THREE.js SETUP
// ══════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141a30);
scene.fog = new THREE.Fog(0x141a30, 80, 130);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);

function updateCamera() {
    const a = window.innerWidth / window.innerHeight;
    camera.aspect = a;
    if (a < 0.55) {
        camera.position.set(0, 62, 10);
        camera.fov = 58;
    } else if (a < 0.8) {
        camera.position.set(0, 55, 14);
        camera.fov = 54;
    } else if (a < 1.1) {
        camera.position.set(0, 48, 18);
        camera.fov = 52;
    } else {
        camera.position.set(0, 38, 22);
        camera.fov = 50;
    }
    camera.updateProjectionMatrix();
    camera.lookAt(0, 0, 0);
}
updateCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights — brighter for visibility
const ambientLight = new THREE.AmbientLight(0x667788, 1.0);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x88ccaa, 0x2a4040, 0.5);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
dirLight.position.set(20, 40, 15);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(IS_MOBILE ? 1024 : 2048, IS_MOBILE ? 1024 : 2048);
dirLight.shadow.camera.left = -35; dirLight.shadow.camera.right = 35;
dirLight.shadow.camera.top = 35; dirLight.shadow.camera.bottom = -35;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x40ffa0, 0.5);
rimLight.position.set(-10, 15, -20);
scene.add(rimLight);

// ══════════════════════════════════════════════
//  GRID & PATH
// ══════════════════════════════════════════════
const PATH_COORDS = [
    [0, 15], [0, 14], [0, 13], [0, 12], [0, 11], [0, 10],
    [1, 10], [2, 10], [3, 10], [4, 10], [5, 10], [6, 10], [7, 10],
    [7, 9], [7, 8], [7, 7], [7, 6],
    [6, 6], [5, 6], [4, 6], [3, 6], [2, 6],
    [2, 5], [2, 4], [2, 3],
    [3, 3], [4, 3], [5, 3], [6, 3], [7, 3], [8, 3], [9, 3], [10, 3],
    [10, 4], [10, 5], [10, 6], [10, 7], [10, 8],
    [11, 8], [12, 8], [13, 8], [14, 8],
    [14, 9], [14, 10], [14, 11], [14, 12], [14, 13],
    [13, 13], [12, 13], [11, 13], [10, 13],
    [10, 14], [10, 15]
];

const grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill('empty'));
const pathSet = new Set();
PATH_COORDS.forEach(([x, z]) => { grid[x][z] = 'path'; pathSet.add(`${x},${z}`); });

function gridToWorld(gx, gz) {
    return new THREE.Vector3((gx - GRID_SIZE / 2 + 0.5) * CELL, 0, (gz - GRID_SIZE / 2 + 0.5) * CELL);
}
const pathWorldPositions = PATH_COORDS.map(([x, z]) => gridToWorld(x, z));

// ══════════════════════════════════════════════
//  BUILD GROUND & PATH — BRIGHTER
// ══════════════════════════════════════════════
const groundGroup = new THREE.Group();
scene.add(groundGroup);

const groundGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL + 4, GRID_SIZE * CELL + 4);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3028, roughness: 0.85 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
groundGroup.add(ground);

const cellGeo = new THREE.BoxGeometry(CELL - 0.15, 0.2, CELL - 0.15);
const pathMat = new THREE.MeshStandardMaterial({ color: 0x4a1818, roughness: 0.5, metalness: 0.3, emissive: 0x3a1010, emissiveIntensity: 0.4 });
const emptyMat = new THREE.MeshStandardMaterial({ color: 0x1a5a38, roughness: 0.6, transparent: true, opacity: 0.9 });

const cellMeshes = [];
for (let x = 0; x < GRID_SIZE; x++) {
    cellMeshes[x] = [];
    for (let z = 0; z < GRID_SIZE; z++) {
        const isPath = grid[x][z] === 'path';
        const mat = isPath ? pathMat : emptyMat;
        const mesh = new THREE.Mesh(cellGeo, mat.clone());
        const pos = gridToWorld(x, z);
        mesh.position.set(pos.x, 0.1, pos.z);
        mesh.receiveShadow = true;
        mesh.userData = { gx: x, gz: z, isPath };
        groundGroup.add(mesh);
        cellMeshes[x][z] = mesh;
    }
}

// Path glow dots
PATH_COORDS.forEach(([x, z], i) => {
    if (i % 3 !== 0) return;
    const pos = gridToWorld(x, z);
    const glowGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.5 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(pos.x, 0.3, pos.z);
    groundGroup.add(glow);
});

// Portals
const entryPos = gridToWorld(PATH_COORDS[0][0], PATH_COORDS[0][1]);
const exitPos = gridToWorld(PATH_COORDS[PATH_COORDS.length - 1][0], PATH_COORDS[PATH_COORDS.length - 1][1]);

function createPortal(pos, color) {
    const group = new THREE.Group();
    if (blenderLoaded && blenderModels['Portal']) {
        const model = cloneBlenderModel('Portal');
        model.position.set(pos.x, 0.5, pos.z);
        model.scale.set(0.9, 0.9, 0.9);
        model.traverse((child) => {
            if (child.isMesh && child.material) {
                child.material.color.setHex(color);
                child.material.emissive.setHex(color);
                child.material.emissiveIntensity = 1.5;
            }
        });
        group.add(model);
    } else {
        const ringGeo = new THREE.TorusGeometry(1.5, 0.25, 12, 32);
        const ringMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2.0 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.set(pos.x, 0.5, pos.z);
        group.add(ring);
    }
    // Portal light
    const pl = new THREE.PointLight(color, 2.0, 8);
    pl.position.set(pos.x, 1.5, pos.z);
    group.add(pl);
    scene.add(group);
    return group;
}
let entryPortal, exitPortal;

    entryPortal = createPortal(entryPos, 0xff3344);

//  GAME STATE
// ══════════════════════════════════════════════
let money = 100;
let hp = MAX_HP;
let wave = 0;
let score = 0;
let gameStarted = false;
let waveInProgress = false;
let gameOver = false;
let selectedTower = null;
let selectedExistingTower = null;
let hoveredCell = null;

const towers = [];
const enemies = [];
const projectiles = [];
const particles = [];

// ══════════════════════════════════════════════
//  TOWER CREATION
// ══════════════════════════════════════════════
function createTowerMesh(type) {
    const data = TOWER_DATA[type];
    const group = new THREE.Group();

    const modelName = TOWER_MODEL_MAP[type];
    if (blenderLoaded && modelName && blenderModels[modelName]) {
        const model = cloneBlenderModel(modelName);
        model.scale.set(1.0, 1.0, 1.0);
        group.add(model);
    } else {
        const baseGeo = new THREE.CylinderGeometry(1.1, 1.3, 0.5, 8);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a4a2a, metalness: 0.6, roughness: 0.3, emissive: data.color, emissiveIntensity: 0.2 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = 0.5; base.castShadow = true;
        group.add(base);

        if (type === 'vitaminC') {
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16),
                new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.3, roughness: 0.4, emissive: data.color, emissiveIntensity: 0.6 }));
            body.position.y = 1.6; body.castShadow = true; group.add(body);
        } else if (type === 'whiteCell') {
            const body = new THREE.Mesh(new THREE.IcosahedronGeometry(1.0, 1),
                new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.5, roughness: 0.2, emissive: 0xaaaaff, emissiveIntensity: 0.5 }));
            body.position.y = 1.8; body.castShadow = true; group.add(body);
        } else if (type === 'broccoli') {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.0, 8),
                new THREE.MeshStandardMaterial({ color: 0x5a9a40 }));
            trunk.position.y = 1.2; group.add(trunk);
            const top = new THREE.Mesh(new THREE.SphereGeometry(0.9, 12, 12),
                new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.6, emissive: 0x2e7d32, emissiveIntensity: 0.5 }));
            top.position.y = 2.2; top.castShadow = true; group.add(top);
        } else if (type === 'sleep') {
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 1.0, 8, 16),
                new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.2, roughness: 0.5, emissive: data.color, emissiveIntensity: 0.7 }));
            body.position.y = 1.7; body.castShadow = true; group.add(body);
        } else if (type === 'exercise') {
            const bodyMat = new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.7, roughness: 0.2, emissive: data.color, emissiveIntensity: 0.4 });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.2, 8, 24), bodyMat);
            ring.position.y = 1.8; ring.rotation.x = Math.PI / 4; ring.castShadow = true;
            group.add(ring);
            const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.2, 8), bodyMat.clone());
            bar.position.y = 1.8; bar.rotation.z = Math.PI / 2;
            group.add(bar);
        }
    }

    const glow = new THREE.PointLight(data.color, 2.0, 7);
    glow.position.y = 2.5;
    group.add(glow);

    const rangeGeo = new THREE.RingGeometry(data.range * CELL - 0.1, data.range * CELL, 48);
    const rangeMat = new THREE.MeshBasicMaterial({ color: 0x00e676, transparent: true, opacity: 0, side: THREE.DoubleSide });
    const rangeRing = new THREE.Mesh(rangeGeo, rangeMat);
    rangeRing.rotation.x = -Math.PI / 2;
    rangeRing.position.y = 0.3;
    group.add(rangeRing);
    group.userData.rangeRing = rangeRing;

    return group;
}

function placeTower(gx, gz, type) {
    const data = TOWER_DATA[type];
    if (money < data.cost) return false;
    if (grid[gx][gz] !== 'empty') return false;

    money -= data.cost;
    grid[gx][gz] = 'tower';

    const mesh = createTowerMesh(type);
    const pos = gridToWorld(gx, gz);
    mesh.position.set(pos.x, 0, pos.z);
    scene.add(mesh);

    const tower = {
        mesh, type, gx, gz,
        level: 1,
        damage: data.damage,
        range: data.range * CELL,
        fireRate: data.fireRate,
        cooldown: 0,
        splash: data.splash || 0,
        slow: data.slow || 0,
        specs: [],
        auraBonus: 0,
    };
    towers.push(tower);

    cellMeshes[gx][gz].material.color.set(0x003a1a);
    cellMeshes[gx][gz].material.opacity = 0.4;

    updateUI();
    showPopup(`${data.name} 設置！`);
    return true;
}

function upgradeTower(tower) {
    const baseCost = TOWER_DATA[tower.type].cost;
    const cost = Math.floor(baseCost * tower.level * 0.7);
    if (money < cost || tower.level >= 5) return;
    money -= cost;
    tower.level++;
    tower.damage = Math.floor(TOWER_DATA[tower.type].damage * (1 + tower.level * 0.4));
    tower.range = TOWER_DATA[tower.type].range * CELL * (1 + tower.level * 0.1);
    tower.fireRate = TOWER_DATA[tower.type].fireRate * Math.max(0.5, 1 - tower.level * 0.1);

    // Check specializations
    const spec = TOWER_SPECS[tower.type];
    if (spec && spec[tower.level]) {
        const s = spec[tower.level];
        tower.specs.push(s.effect);
        if (s.effect === 'megaSplash') {
            tower.splash = (TOWER_DATA[tower.type].splash || 2.0) * 1.5;
            tower.damage = Math.floor(tower.damage * 1.3);
        }
        if (s.effect === 'sniper') {
            tower.range *= 1.4;
        }
        showPopup(`⭐ ${s.name} 習得！\n${s.desc}`);
    } else {
        showPopup(`Lv${tower.level}にアップグレード！(${cost}P)`);
    }

    tower.mesh.scale.setScalar(1 + tower.level * 0.08);
    // Update range ring
    if (tower.mesh.userData.rangeRing) {
        tower.mesh.userData.rangeRing.geometry.dispose();
        tower.mesh.userData.rangeRing.geometry = new THREE.RingGeometry(tower.range - 0.1, tower.range, 48);
    }
    updateUI();
}

function sellTower(tower) {
    const refund = Math.floor(TOWER_DATA[tower.type].cost * tower.level * 0.4);
    money += refund;
    grid[tower.gx][tower.gz] = 'empty';
    scene.remove(tower.mesh);
    towers.splice(towers.indexOf(tower), 1);
    cellMeshes[tower.gx][tower.gz].material.color.set(0x1a5a38);
    cellMeshes[tower.gx][tower.gz].material.opacity = 0.9;
    selectedExistingTower = null;
    document.getElementById('sell-btn').style.display = 'none';
    showPopup(`売却！ +${refund}P`);
    updateUI();
}

//  ENEMY CREATION
// ══════════════════════════════════════════════
function createEnemyMesh(type) {
    const data = ENEMY_TYPES[type];
    const group = new THREE.Group();

    const modelName = ENEMY_MODEL_MAP[type];
    if (blenderLoaded && modelName && blenderModels[modelName]) {
        const model = cloneBlenderModel(modelName);
        model.scale.set(1.0, 1.0, 1.0);
        group.add(model);
    } else {
        if (type === 'virus') {
            const bodyMat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.5, roughness: 0.3 });
            group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.6, 0), bodyMat));
            for (let i = 0; i < 8; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 4), new THREE.MeshStandardMaterial({ color: 0xff6666 }));
                const phi = Math.random() * Math.PI * 2, theta = Math.random() * Math.PI;
                spike.position.set(Math.sin(theta)*Math.cos(phi)*0.6, Math.sin(theta)*Math.sin(phi)*0.6, Math.cos(theta)*0.6);
                spike.lookAt(0,0,0); spike.rotateX(Math.PI); group.add(spike);
            }
        } else if (type === 'bacteria') {
            group.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.6, 8, 12),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.4, roughness: 0.5 })));
        } else if (type === 'junkFood') {
            const bunMat = new THREE.MeshStandardMaterial({ color: 0xe0b040, emissive: 0x805020, emissiveIntensity: 0.2 });
            const topBun = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 8, 0, Math.PI*2, 0, Math.PI/2), bunMat);
            topBun.position.y = 0.15; group.add(topBun);
            group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.15, 12), new THREE.MeshStandardMaterial({ color: 0x7d4a2a })));
            const botBun = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.45, 0.2, 12), bunMat.clone());
            botBun.position.y = -0.2; group.add(botBun);
        } else if (type === 'stress') {
            group.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.5),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x444444, emissiveIntensity: 0.5, roughness: 0.2, metalness: 0.8 })));
        } else if (type === 'allergen') {
            group.add(new THREE.Mesh(new THREE.DodecahedronGeometry(0.5),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.4, roughness: 0.4 })));
        } else if (type === 'sleepDebt') {
            group.add(new THREE.Mesh(new THREE.TorusKnotGeometry(0.35, 0.12, 64, 8),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.5 })));
        } else if (type === 'sugarRush') {
            group.add(new THREE.Mesh(new THREE.ConeGeometry(0.45, 1.0, 6),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.4, metalness: 0.5 })));
        } else if (type === 'burnout') {
            group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 0),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x222222, emissiveIntensity: 0.3, roughness: 0.1, metalness: 0.9 })));
        } else if (type === 'bossVirus') {
            const bodyMat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.7, roughness: 0.2, metalness: 0.4 });
            group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.9, 1), bodyMat));
            for (let i = 0; i < 14; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.6, 4), new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.4 }));
                const phi = Math.random() * Math.PI * 2, theta = Math.random() * Math.PI;
                spike.position.set(Math.sin(theta)*Math.cos(phi)*0.9, Math.sin(theta)*Math.sin(phi)*0.9, Math.cos(theta)*0.9);
                spike.lookAt(0,0,0); spike.rotateX(Math.PI); group.add(spike);
            }
        } else if (type === 'pandemic') {
            const bodyMat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.8 });
            group.add(new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 2), bodyMat));
            for (let i = 0; i < 20; i++) {
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.8, 4),
                    new THREE.MeshStandardMaterial({ color: 0xff4466, emissive: 0xff2244, emissiveIntensity: 0.5 }));
                const phi = Math.random() * Math.PI * 2, theta = Math.random() * Math.PI;
                spike.position.set(Math.sin(theta)*Math.cos(phi)*1.1, Math.sin(theta)*Math.sin(phi)*1.1, Math.cos(theta)*1.1);
                spike.lookAt(0,0,0); spike.rotateX(Math.PI); group.add(spike);

    // Health bar
    const hpBarBg = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.15),
        new THREE.MeshBasicMaterial({ color: 0x440000 }));
    hpBarBg.position.y = 1.3; hpBarBg.rotation.x = -Math.PI / 4;

    group.scale.setScalar(data.scale);
    return group;
}

function spawnEnemy(type, atIndex) {
    const data = ENEMY_TYPES[type];
    const mesh = createEnemyMesh(type);
    const idx = atIndex || 0;
    const startPos = pathWorldPositions[idx].clone();
    startPos.y = 1.0;
    mesh.position.copy(startPos);
    scene.add(mesh);

    const waveScale = 1 + wave * 0.12;
    enemies.push({
        mesh, type,
        hp: Math.floor(data.hp * waveScale),
        maxHp: Math.floor(data.hp * waveScale),
        speed: data.speed,
        baseSpeed: data.speed,
        reward: data.reward,
        pathIndex: idx,
        pathProgress: 0,
        slowTimer: 0,
        poisonTimer: 0,
        poisonDmg: 0,
        freezeTimer: 0,
        split: false,
    });
}

// ══════════════════════════════════════════════
//  WAVE SYSTEM — 25 WAVES
// ══════════════════════════════════════════════
function getWaveEnemies(w) {
    const e = [];
    if (w <= 2) {
        for (let i = 0; i < 5 + w * 2; i++) e.push('virus');
    } else if (w <= 4) {
        for (let i = 0; i < 4; i++) e.push('virus');
        for (let i = 0; i < 2 + w; i++) e.push('bacteria');
    } else if (w <= 7) {
        for (let i = 0; i < 3; i++) e.push('virus');
        for (let i = 0; i < 4; i++) e.push('bacteria');
        for (let i = 0; i < w - 3; i++) e.push('junkFood');
    } else if (w <= 10) {
        for (let i = 0; i < 3; i++) e.push('bacteria');
        for (let i = 0; i < 3; i++) e.push('junkFood');
        for (let i = 0; i < w - 5; i++) e.push('stress');
        for (let i = 0; i < 2; i++) e.push('allergen');
    } else if (w <= 13) {
        for (let i = 0; i < 4; i++) e.push('stress');
        for (let i = 0; i < 3; i++) e.push('allergen');
        for (let i = 0; i < w - 8; i++) e.push('sleepDebt');
        for (let i = 0; i < 2; i++) e.push('sugarRush');
    } else if (w <= 16) {
        for (let i = 0; i < 3; i++) e.push('allergen');
        for (let i = 0; i < 4; i++) e.push('sleepDebt');
        for (let i = 0; i < 4; i++) e.push('sugarRush');
        e.push('bossVirus');
    } else if (w <= 19) {
        for (let i = 0; i < 5; i++) e.push('sugarRush');
        for (let i = 0; i < 3; i++) e.push('burnout');
        for (let i = 0; i < w - 14; i++) e.push('allergen');
        for (let i = 0; i < 2; i++) e.push('sleepDebt');
    } else if (w <= 22) {
        for (let i = 0; i < 4; i++) e.push('burnout');
        for (let i = 0; i < 5; i++) e.push('stress');
        for (let i = 0; i < 4; i++) e.push('sugarRush');
        e.push('bossVirus');
        e.push('bossVirus');
    } else if (w <= 24) {
        for (let i = 0; i < 3; i++) e.push('burnout');
        for (let i = 0; i < 6; i++) e.push('allergen');
        for (let i = 0; i < 4; i++) e.push('sleepDebt');
        for (let i = 0; i < 2; i++) e.push('bossVirus');
        e.push('pandemic');
    } else {
        for (let i = 0; i < 5; i++) e.push('burnout');
        for (let i = 0; i < 3; i++) e.push('bossVirus');
        e.push('pandemic');
        e.push('pandemic');
    }
    return e;
}

let waveQueue = [];
let spawnTimer = 0;
const SPAWN_INTERVAL = 0.55;

function startWave() {
    if (waveInProgress || gameOver) return;
    wave++;
    waveInProgress = true;
    waveQueue = getWaveEnemies(wave);
    spawnTimer = 0;
    document.getElementById('wave-btn').disabled = true;
    updateUI();
}

function createProjectile(tower, target) {
    const data = TOWER_DATA[tower.type];
    const geo = new THREE.SphereGeometry(0.3, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: data.projColor });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(tower.mesh.position);
    mesh.position.y = 1.5;
    scene.add(mesh);

    projectiles.push({
        mesh, target, tower,
        speed: 22,
        damage: tower.damage,
        splash: tower.splash,
        slow: tower.slow,
        pierceCount: tower.specs.includes('pierce') ? 2 : 0,
        hitTargets: new Set(),
    });
}

function createParticle(pos, color, count) {
    const c = count ?? PARTICLE_COUNT;
    for (let i = 0; i < c; i++) {
        const geo = new THREE.SphereGeometry(0.12, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        scene.add(mesh);
        particles.push({
            mesh,
            velocity: new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 3 + 1, (Math.random() - 0.5) * 4),
            life: 1.0,
            decay: 2 + Math.random(),
        });
    }
}

function updateUI() {
    document.getElementById('money-text').textContent = money;
    document.getElementById('hp-text').textContent = `${hp}/${MAX_HP}`;
    document.getElementById('wave-text').textContent = `${wave}/${MAX_WAVES}`;
    document.getElementById('score-text').textContent = score;

    const hpBar = document.getElementById('hp-bar');
    hpBar.style.width = (hp / MAX_HP * 100) + '%';
    hpBar.classList.toggle('low', hp < MAX_HP * 0.3);

    document.querySelectorAll('.tower-btn').forEach(btn => {
        const type = btn.dataset.tower;
        const cost = TOWER_DATA[type].cost;
        btn.classList.toggle('disabled', money < cost);
        btn.classList.toggle('selected', selectedTower === type);
    });
}

function showPopup(text) {
    const popup = document.getElementById('popup');
    popup.textContent = text;
    popup.classList.add('show');
    setTimeout(() => popup.classList.remove('show'), 1800);
}

function showTooltip(x, y, tower) {
    const tip = document.getElementById('tooltip');
    const data = TOWER_DATA[tower.type];
    const cost = tower.level < 5 ? Math.floor(data.cost * tower.level * 0.7) : '-';
    let specText = '';
    if (tower.specs.length > 0) {
        tower.specs.forEach(eff => {
            const allSpecs = TOWER_SPECS[tower.type];
            for (const lv of Object.keys(allSpecs)) {
                if (allSpecs[lv].effect === eff) specText += `\n⭐ ${allSpecs[lv].name}`;
            }
        });
    }
    const nextSpec = TOWER_SPECS[tower.type];
    let nextText = '';
    if (nextSpec[tower.level + 1]) {
        nextText = `\n次Lv: ⭐${nextSpec[tower.level + 1].name}`;
    }
    tip.innerHTML = `<b>${data.name} Lv${tower.level}</b><br>DMG:${tower.damage} RNG:${(tower.range/CELL).toFixed(1)} SPD:${tower.fireRate.toFixed(2)}${specText ? '<br>' + specText : ''}${nextText ? '<br>' + nextText : ''}<br>UP: ${cost}P | 売却: ${Math.floor(data.cost * tower.level * 0.4)}P`;
    tip.style.display = 'block';
    tip.style.left = Math.min(x, window.innerWidth - 230) + 'px';
    tip.style.top = Math.max(y - 120, 10) + 'px';
}

// ══════════════════════════════════════════════
//  INPUT — Touch + Mouse
// ══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.querySelectorAll('.tower-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const type = btn.dataset.tower;
        selectedTower = selectedTower === type ? null : type;
        selectedExistingTower = null;
        document.getElementById('sell-btn').style.display = 'none';
        document.getElementById('tooltip').style.display = 'none';
        updateUI();
    });
});

document.getElementById('wave-btn').addEventListener('click', startWave);
document.getElementById('sell-btn').addEventListener('click', () => {
    if (selectedExistingTower) sellTower(selectedExistingTower);
});

function handleInteraction(clientX, clientY) {
    if (!gameStarted || gameOver) return;
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // Check existing tower click
    const towerMeshes = towers.map(t => t.mesh);
    const towerHits = raycaster.intersectObjects(towerMeshes, true);
    if (towerHits.length > 0) {
        let hitObj = towerHits[0].object;
        while (hitObj.parent && !towers.find(t => t.mesh === hitObj)) hitObj = hitObj.parent;
        const tower = towers.find(t => t.mesh === hitObj);
        if (tower) {
            if (selectedExistingTower === tower) {
                // Double-tap = upgrade
                upgradeTower(tower);
            } else {
                selectedExistingTower = tower;
                selectedTower = null;
                // Show range
                towers.forEach(t => { if (t.mesh.userData.rangeRing) t.mesh.userData.rangeRing.material.opacity = 0; });
                if (tower.mesh.userData.rangeRing) tower.mesh.userData.rangeRing.material.opacity = 0.3;
                // Show sell button
                document.getElementById('sell-btn').style.display = 'block';
                showTooltip(clientX, clientY, tower);
            }
            updateUI();
            return;
        }
    }

    // Check grid cells for placement
    selectedExistingTower = null;
    document.getElementById('sell-btn').style.display = 'none';
    document.getElementById('tooltip').style.display = 'none';
    towers.forEach(t => { if (t.mesh.userData.rangeRing) t.mesh.userData.rangeRing.material.opacity = 0; });

    const cellObjects = [];
    for (let x = 0; x < GRID_SIZE; x++)
        for (let z = 0; z < GRID_SIZE; z++)
            cellObjects.push(cellMeshes[x][z]);

    const hits = raycaster.intersectObjects(cellObjects);
    if (hits.length > 0 && selectedTower) {
        const cell = hits[0].object;
        const { gx, gz, isPath } = cell.userData;
        if (!isPath && grid[gx][gz] === 'empty') {
            placeTower(gx, gz, selectedTower);
        }
    }
}

renderer.domElement.addEventListener('click', (e) => handleInteraction(e.clientX, e.clientY));

renderer.domElement.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    handleInteraction(touch.clientX, touch.clientY);
}, { passive: false });

// Hover effect (desktop only)
renderer.domElement.addEventListener('mousemove', (e) => {
    if (!gameStarted || gameOver || IS_MOBILE) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (hoveredCell) {
        const { gx, gz } = hoveredCell.userData;
        if (grid[gx][gz] === 'empty' && !hoveredCell.userData.isPath) {
            hoveredCell.material.color.set(0x1a5a38);
            hoveredCell.material.opacity = 0.9;
        }
        hoveredCell = null;
    }

    const cellObjects = [];
    for (let x = 0; x < GRID_SIZE; x++)
        for (let z = 0; z < GRID_SIZE; z++)
            cellObjects.push(cellMeshes[x][z]);

    const hits = raycaster.intersectObjects(cellObjects);
    if (hits.length > 0) {
        const cell = hits[0].object;
        const { gx, gz, isPath } = cell.userData;
        if (!isPath && grid[gx][gz] === 'empty' && selectedTower) {
            cell.material.color.set(0x00e676);
            cell.material.opacity = 0.8;
            hoveredCell = cell;
        }
    }
});

// ══════════════════════════════════════════════
//  GAME LOGIC UPDATE
// ══════════════════════════════════════════════
function killEnemy(enemy, killerTower) {
    const reward = enemy.reward + (killerTower && killerTower.specs.includes('devour') ? 5 : 0);
    money += reward;
    score += reward * 2;
    createParticle(enemy.mesh.position.clone(), ENEMY_TYPES[enemy.type].color, PARTICLE_COUNT + 3);

    // Burnout spawns 2 stress on death
    if (enemy.type === 'burnout') {
        spawnEnemy('stress', enemy.pathIndex);
        spawnEnemy('stress', enemy.pathIndex);
    }

    scene.remove(enemy.mesh);
    const idx = enemies.indexOf(enemy);
    if (idx >= 0) enemies.splice(idx, 1);
    updateUI();
}

function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];

        // Freeze > Slow > Normal
        if (enemy.freezeTimer > 0) {
            enemy.freezeTimer -= dt;
            enemy.speed = 0;
        } else if (enemy.slowTimer > 0) {
            enemy.slowTimer -= dt;
            enemy.speed = enemy.type === 'sleepDebt' ? enemy.baseSpeed : enemy.baseSpeed * 0.4;
        } else {
            enemy.speed = enemy.baseSpeed;
        }

        // Poison DOT
        if (enemy.poisonTimer > 0) {
            enemy.poisonTimer -= dt;
            enemy.hp -= enemy.poisonDmg * dt;
            if (enemy.hp <= 0) { killEnemy(enemy, null); continue; }
        }

        // Pandemic regen & split
        if (enemy.type === 'pandemic') {
            enemy.hp = Math.min(enemy.maxHp, enemy.hp + enemy.maxHp * 0.008 * dt);
            if (!enemy.split && enemy.hp < enemy.maxHp * 0.5) {
                enemy.split = true;
                spawnEnemy('bossVirus', enemy.pathIndex);
                spawnEnemy('bossVirus', enemy.pathIndex);
                showPopup('⚠️ パンデミック分裂！');
            }
        }

        // Move along path
        if (enemy.pathIndex < pathWorldPositions.length - 1) {
            const current = pathWorldPositions[enemy.pathIndex];
            const next = pathWorldPositions[enemy.pathIndex + 1];
            const dir = new THREE.Vector3().subVectors(next, current);
            const dist = dir.length();

            enemy.pathProgress += enemy.speed * dt;
            if (enemy.pathProgress >= dist) {
                enemy.pathProgress -= dist;
                enemy.pathIndex++;
            }

            if (enemy.pathIndex < pathWorldPositions.length - 1) {
                const curr = pathWorldPositions[enemy.pathIndex];
                const nxt = pathWorldPositions[Math.min(enemy.pathIndex + 1, pathWorldPositions.length - 1)];
                const d = new THREE.Vector3().subVectors(nxt, curr).normalize();
                enemy.mesh.position.set(
                    curr.x + d.x * enemy.pathProgress,
                    1.0 + Math.sin(Date.now() * 0.005 + i) * 0.15,
                    curr.z + d.z * enemy.pathProgress
                );
                enemy.mesh.rotation.y = Math.atan2(d.x, d.z);
            }
        } else {
            hp--;
            score = Math.max(0, score - 5);
            scene.remove(enemy.mesh);
            enemies.splice(i, 1);
            createParticle(exitPos.clone().setY(1), 0xff3344, PARTICLE_COUNT + 2);
            if (hp <= 0) endGame(false);
            updateUI();
            continue;
        }

        // Visual rotation
        if (enemy.mesh.children[0]) {
            enemy.mesh.children[0].rotation.y += dt * 1.5;
            enemy.mesh.children[0].rotation.x += dt * 0.5;
        }

        // HP bar
        const hpBar = enemy.mesh.userData.hpBar;
        if (hpBar) {
            const ratio = Math.max(0, enemy.hp / enemy.maxHp);
            hpBar.scale.x = ratio;
            hpBar.position.x = -(1 - ratio) * 0.6;
            hpBar.material.color.set(ratio > 0.5 ? 0x00ff80 : (ratio > 0.25 ? 0xffdd44 : 0xff3344));
        }
    }
}

function updateTowers(dt) {
    // Aura pass
    towers.forEach(t => { t.auraBonus = 0; });
    towers.forEach(t => {
        if (t.specs.includes('aura')) {
            towers.forEach(other => {
                if (other !== t) {
                    const d = t.mesh.position.distanceTo(other.mesh.position);
                    if (d < t.range * 0.6) other.auraBonus = Math.max(other.auraBonus, 0.2);
                }
            });
        }
    });

    towers.forEach(tower => {
        const effectiveRate = tower.fireRate * (1 - tower.auraBonus);
        tower.cooldown -= dt;
        if (tower.cooldown > 0) return;

        let target = null;
        let maxProgress = -1;
        enemies.forEach(enemy => {
            const dist = tower.mesh.position.distanceTo(enemy.mesh.position);
            if (dist <= tower.range) {
                const progress = enemy.pathIndex + enemy.pathProgress;
                if (progress > maxProgress) { maxProgress = progress; target = enemy; }
            }
        });

        if (target) {
            tower.cooldown = effectiveRate;

            if (tower.specs.includes('burst')) {
                // Fire 3 shots
                for (let b = 0; b < 3; b++) {
                    setTimeout(() => { if (enemies.includes(target)) createProjectile(tower, target); }, b * 80);
                }
            } else {
                createProjectile(tower, target);
            }
        }
    });
}

function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const proj = projectiles[i];
        if (!proj.target || !enemies.includes(proj.target)) {
            // Pierce: find next target
            if (proj.pierceCount > 0) {
                let nextTarget = null;
                let minDist = Infinity;
                enemies.forEach(e => {
                    if (!proj.hitTargets.has(e)) {
                        const d = e.mesh.position.distanceTo(proj.mesh.position);
                        if (d < minDist) { minDist = d; nextTarget = e; }
                    }
                });
                if (nextTarget && minDist < 8) {
                    proj.target = nextTarget;
                    continue;
                }
            }
            scene.remove(proj.mesh);
            projectiles.splice(i, 1);
            continue;
        }

        const dir = new THREE.Vector3().subVectors(proj.target.mesh.position, proj.mesh.position);
        const dist = dir.length();

        if (dist < 0.5) {
            let dmg = proj.damage;
            const tw = proj.tower;

            // Crit
            if (tw.specs.includes('crit') && Math.random() < 0.3) {
                dmg *= 3;
                createParticle(proj.mesh.position.clone(), 0xffff00, 4);
            }
            // Anti-boss
            if (tw.specs.includes('antiBoss') && (proj.target.type === 'bossVirus' || proj.target.type === 'pandemic')) {
                dmg = Math.floor(dmg * 1.5);
            }
            // Sniper
            if (tw.specs.includes('sniper')) {
                const range = tw.range;
                const d = tw.mesh.position.distanceTo(proj.target.mesh.position);
                dmg = Math.floor(dmg * (0.8 + (d / range) * 0.7));
            }

            proj.target.hp -= dmg;
            createParticle(proj.mesh.position.clone(), TOWER_DATA[tw.type].projColor, 3);

            // Slow
            if (proj.slow > 0) proj.target.slowTimer = 2.0;
            // Freeze
            if (tw.specs.includes('freeze') && Math.random() < 0.1) proj.target.freezeTimer = 2.0;
            // Poison
            if (tw.specs.includes('poison')) { proj.target.poisonTimer = 3.0; proj.target.poisonDmg = 5; }
            // SugarRush: speeds up when hit
            if (proj.target.type === 'sugarRush') {
                proj.target.baseSpeed = Math.min(proj.target.baseSpeed * 1.08, ENEMY_TYPES.sugarRush.speed * 2);
            }

            // Splash
            if (proj.splash > 0) {
                enemies.forEach(e => {
                    if (e !== proj.target) {
                        const d = e.mesh.position.distanceTo(proj.mesh.position);
                        if (d < proj.splash) e.hp -= Math.floor(dmg * 0.6);
                    }
                });
                createParticle(proj.mesh.position.clone(), 0x81c784, PARTICLE_COUNT + 2);
            }

            // Kill check
            if (proj.target.hp <= 0) killEnemy(proj.target, tw);

            // Pierce: keep going
            if (proj.pierceCount > 0) {
                proj.hitTargets.add(proj.target);
                proj.pierceCount--;
                proj.target = null; // will find next in the loop
                continue;
            }

            scene.remove(proj.mesh);
            projectiles.splice(i, 1);
        } else {
            dir.normalize().multiplyScalar(proj.speed * dt);
            proj.mesh.position.add(dir);
        }
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= p.decay * dt;
        p.velocity.y -= 8 * dt;
        p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.scale.setScalar(p.life);
        if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
    }
}

function updateSpawner(dt) {
    if (!waveInProgress) return;

    if (waveQueue.length > 0) {
        spawnTimer += dt;
        if (spawnTimer >= SPAWN_INTERVAL) {
            spawnTimer = 0;
            const type = waveQueue.shift();
            spawnEnemy(type);
        }
    }

    if (waveQueue.length === 0 && enemies.length === 0) {
        waveInProgress = false;
        document.getElementById('wave-btn').disabled = false;
        const bonus = 20 + wave * 5;
        money += bonus;
        score += 50;
        // Heal 1 HP every 5 waves
        if (wave % 5 === 0 && hp < MAX_HP) { hp = Math.min(MAX_HP, hp + 2); showPopup(`Wave ${wave} クリア！ +${bonus}P ❤️+2回復`); }
        else showPopup(`Wave ${wave} クリア！ +${bonus}P`);
        updateUI();

        if (wave >= MAX_WAVES) endGame(true);
    }
}

function endGame(won) {
    gameOver = true;
    const screen = document.getElementById('game-over');
    screen.classList.remove('hidden');
    document.getElementById('result-title').textContent = won ? '🎉 免疫力MAX！クリア！' : '💀 GAME OVER';
    document.getElementById('result-stats').innerHTML = `
        到達Wave: ${wave}/${MAX_WAVES}<br>
        スコア: ${score}<br>
        設置タワー: ${towers.length}<br>
        残り体力: ${hp}/${MAX_HP}
    `;
}

// ══════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════
const clock = new THREE.Clock();
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    time += dt;

    if (!gameStarted) {
        camera.position.x = Math.sin(time * 0.2) * 30;
        camera.position.y = 40;
        camera.position.z = Math.cos(time * 0.2) * 25;
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
        return;
    }

    if (!gameOver) {
        updateSpawner(dt);
        updateEnemies(dt);
        updateTowers(dt);
        updateProjectiles(dt);
    }
    updateParticles(dt);

    if (entryPortal && entryPortal.children[0]) entryPortal.children[0].rotation.y += dt * 2;
    if (exitPortal && exitPortal.children[0]) exitPortal.children[0].rotation.y -= dt * 2;

    towers.forEach(t => {
        const child = t.mesh.children[0];
        if (child) child.rotation.y += dt * 0.3;
    });

    renderer.render(scene, camera);
}

// ══════════════════════════════════════════════
//  START / RESTART
// ══════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').classList.add('hidden');
    gameStarted = true;
    updateCamera();
    updateUI();
});

document.getElementById('retry-btn').addEventListener('click', () => location.reload());

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    updateCamera();
});

loadBlenderModels().then(() => {
    initPortals();
    animate();
});
</script>
